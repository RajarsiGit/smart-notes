<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Character Encoding & Viewport (required first) -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO & Metadata -->
    <meta name="description" content="A fast, minimal note-taking app. Capture and organize your thoughts with tags and search." />
    <meta name="theme-color" content="#0d9488" />
    <meta name="color-scheme" content="light dark" />
    
    <title>Smart Notes</title>
    
    <!-- Favicon with Fallback -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    
    <!-- Font Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Font Load with font-display=swap for better LCP -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap"
      />
    </noscript>
  </head>
  <body>
    <!-- Root element for React app -->
    <div id="root"></div>
    
    <!-- Main application script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
